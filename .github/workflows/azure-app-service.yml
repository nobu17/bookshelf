name: Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bookshelf_app/frontend/package-lock.json

      - name: Build frontend
        working-directory: bookshelf_app/frontend
        env:
          VITE_APP_API_ROOT: /api
          VITE_APP_API_TIMEOUT: "15000"
        run: |
          npm ci
          npm run build

      - name: Run unit tests
        env:
          ENV_FILE: .env.test
          PYTHONPATH: .
        run: pytest -q tests/unit

      - name: Remove frontend install cache from package
        run: rm -rf bookshelf_app/frontend/node_modules

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: |
            .
            !.git
            !.github
            !venv_webapp
            !bookshelf_app/frontend/node_modules
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ vars.AZURE_WEBAPP_URL }}

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
