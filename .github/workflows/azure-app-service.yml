name: Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: bookshelf_app/frontend/package-lock.json

      - name: Build frontend
        working-directory: bookshelf_app/frontend
        env:
          VITE_APP_API_ROOT: /api
          VITE_APP_API_TIMEOUT: "60000"
        run: |
          npm ci
          npm run build

      - name: Run unit tests
        env:
          ENV_FILE: .env.test
          PYTHONPATH: .
        run: pytest -q tests/unit

      - name: Remove frontend install cache from package
        run: rm -rf bookshelf_app/frontend/node_modules

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: |
            .
            !.git
            !.github
            !venv_webapp
            !bookshelf_app/frontend/node_modules
          retention-days: 1

  migrate:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment:
      name: production

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get runner public IP
        id: runner_ip
        run: echo "ip=$(curl -sS https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Allow runner IP to Azure SQL
        env:
          FIREWALL_RULE_NAME: github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          az sql server firewall-rule create \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_SQL_SERVER_NAME }}" \
            --name "${FIREWALL_RULE_NAME}" \
            --start-ip-address "${{ steps.runner_ip.outputs.ip }}" \
            --end-ip-address "${{ steps.runner_ip.outputs.ip }}"

      - name: Run database migrations
        env:
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
          CRYPT_SECRET_KEY: dummy-for-migration
          CRYPT_ALGORITHM: HS256
          GOOGLE_BOOKS_API_KEY: ""
        run: |
          for attempt in {1..6}; do
            echo "Running database migrations. attempt=${attempt}"
            if alembic upgrade head; then
              exit 0
            fi
            if [ "${attempt}" -eq 6 ]; then
              echo "Database migration failed after ${attempt} attempts."
              exit 1
            fi
            echo "Database may be waking up or firewall may still be propagating. Retrying in 30 seconds..."
            sleep 30
          done

      - name: Remove runner IP from Azure SQL
        if: always()
        env:
          FIREWALL_RULE_NAME: github-actions-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          az sql server firewall-rule delete \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --server "${{ vars.AZURE_SQL_SERVER_NAME }}" \
            --name "${FIREWALL_RULE_NAME}" || true

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - migrate
    permissions:
      contents: read
      id-token: write
    environment:
      name: production
      url: ${{ vars.AZURE_WEBAPP_URL }}

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: app
          path: .

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: .
