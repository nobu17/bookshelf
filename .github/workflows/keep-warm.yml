name: Keep Warm

on:
  schedule:
    # JST 07:00-22:30 every 30 minutes.
    - cron: "*/30 22,23,0-13 * * *"
    # JST 23:00.
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS "${{ vars.AZURE_WEBAPP_URL }}/api/health"
